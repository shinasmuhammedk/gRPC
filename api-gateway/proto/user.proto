syntax = "proto3";

package user;

option go_package = "./proto";

message User{
    int32 id = 1;
    string name = 2;
}

message UserRequest{
    int32 id =1;
}

message Empty{}

message UserList{
    repeated User users = 1;
}

service UserService{
    rpc CreateUser (User) returns (User);
    rpc GetUser (UserRequest) returns (User);
    rpc ListUser (Empty) returns (UserList);
}